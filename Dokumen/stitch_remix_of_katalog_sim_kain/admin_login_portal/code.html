<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-line {
            border: none;
            border-bottom: 1px solid theme('colors.outline-variant');
            border-radius: 0;
            background-color: transparent;
            padding-left: 0;
            padding-right: 0;
            transition: border-color 0.3s ease;
        }
        .input-line:focus {
            outline: none;
            box-shadow: none;
            border-bottom-color: theme('colors.primary');
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-4 md:p-8">
<main class="w-full max-w-[1000px] grid grid-cols-1 md:grid-cols-2 bg-surface-container-lowest overflow-hidden min-h-[600px]">
<!-- Image Canvas -->
<div class="hidden md:block relative h-full bg-surface-container-high">
<img alt="Textile Archive" class="absolute inset-0 w-full h-full object-cover mix-blend-multiply opacity-80" data-alt="A close-up, high-resolution photograph of a meticulously woven textile artifact in a pristine, minimalist gallery setting. The lighting is bright and even, casting soft, ambient shadows that highlight the intricate threads and texture of the fabric. The composition features a neutral, high-key light mode aesthetic with subtle architectural grays and vibrant, heritage red accents in the weave. The overall mood is sophisticated, technical, and serene, evoking the atmosphere of a premium digital archive." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3mEEX2YZJ9alGQOyfN5Wf9uvQ7R35AtnoYJa5G8Inui2XjTjAM1_QEaaCVZtMwtfE-A641fQY6b3yqbrE_plKcjPap7_VIgPNW6sP5v2hOZtrRR_i0WQGVkZA7b9XwrJ5amcaDg2H7SXZNB-h5CDGXPdMbW5lggp3XX0UrmQ_PFZHO6Hv-N1-23llWn8q3Bxrv9CFu8mQRONvQwjrmeu3FvM-HDR7SJqDWxglSCZN12A2epeCDRdR0NYHzNgcm3zrTtDpK1NkISIg"/>
<!-- Glassmorphism Overlay Overlay -->
<div class="absolute inset-0 bg-surface/20 backdrop-blur-[2px] flex items-end p-12">
<div>
<h2 class="text-3xl font-bold tracking-tight text-on-surface mb-2">Mitra Abadi</h2>
<p class="text-on-surface/80 font-medium">Textile Archive Management</p>
</div>
</div>
</div>
<!-- Login Canvas -->
<div class="p-8 md:p-16 flex flex-col justify-center relative">
<!-- Brand -->
<div class="mb-12">
<span class="material-symbols-outlined text-4xl text-primary mb-6" data-icon="museum" data-weight="fill">museum</span>
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface mb-2">Portal Admin</h1>
<p class="text-on-surface/70 font-medium tracking-wide">The Digital Curator</p>
</div>
<!-- Error Message (Hidden by default, shown for demonstration) -->
<div class="mb-8 p-4 bg-error-container text-on-error-container flex items-start gap-3 rounded-DEFAULT" role="alert">
<span class="material-symbols-outlined mt-0.5" data-icon="error">error</span>
<p class="text-sm font-medium leading-relaxed">Email atau kata sandi yang Anda masukkan salah. Silakan periksa kembali dan coba lagi.</p>
</div>
<!-- Form -->
<form class="space-y-8">
<!-- Email Field -->
<div class="relative">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface/60 mb-2" for="email">Alamat Email</label>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface/50 mr-3" data-icon="mail">mail</span>
<input class="input-line w-full text-on-surface font-medium pb-2 placeholder-on-surface/30" id="email" name="email" placeholder="admin@mitraabadi.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="relative">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface/60 mb-2" for="password">Kata Sandi</label>
<div class="flex items-center">
<span class="material-symbols-outlined text-on-surface/50 mr-3" data-icon="lock">lock</span>
<input class="input-line w-full text-on-surface font-medium pb-2 placeholder-on-surface/30" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="text-on-surface/50 hover:text-primary transition-colors ml-2" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-8 flex flex-col gap-6">
<button class="w-full bg-primary-container text-on-primary-container py-4 px-6 rounded-md font-bold tracking-wide hover:bg-primary transition-colors duration-300 flex justify-center items-center gap-2" type="submit">
                        Masuk <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<a class="text-center text-sm font-medium text-on-surface/60 hover:text-primary transition-colors inline-block mx-auto border-b border-transparent hover:border-primary pb-0.5" href="#">
                        Lupa kata sandi?
                    </a>
</div>
</form>
<!-- Minimal Footer -->
<div class="mt-auto pt-16 text-center md:text-left">
<p class="text-[10px] uppercase tracking-widest font-semibold text-on-surface/40">© 2024 Mitra Abadi. Secure Access.</p>
</div>
</div>
</main>
</body></html>
